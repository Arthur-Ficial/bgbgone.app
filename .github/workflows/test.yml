name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: swift test
    runs-on: macos-26
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          # The pinned bgbgone CLI lives in the vendor/bgbgone submodule; the
          # real-binary e2e (RealBinaryE2ETests) needs it built or it SKIPS.
          submodules: recursive

      - name: Show Swift version
        run: swift --version

      - name: Cache SwiftPM artefacts
        uses: actions/cache@v4
        with:
          path: |
            build
            ~/.swiftpm
          # Include github.repository_id so a repo rename invalidates the cache
          # (PCMs bake absolute paths from /runner/work/<repo>/<repo>/, which
          # break on rename and produce "missing required module 'SwiftShims'").
          key: ${{ runner.os }}-swiftpm-${{ github.repository_id }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-${{ github.repository_id }}-

      - name: Cache pinned bgbgone helper build
        uses: actions/cache@v4
        with:
          path: vendor/bgbgone/.build
          # Invalidates when the pinned version (BGBGONE_VERSION in build-app.sh)
          # or the submodule wiring changes.
          key: ${{ runner.os }}-bgbgone-helper-${{ hashFiles('scripts/build-app.sh', '.gitmodules') }}

      - name: Build pinned bgbgone helper (for the real-binary e2e)
        run: make vendor

      - name: Run tests
        run: swift test --parallel --scratch-path build

      - name: NoBusinessLogic guard summary
        # If this exits non-zero something imported Vision/CoreImage in Sources/.
        # The architectural promise is broken — fail the build loudly.
        run: |
          if grep -RnE 'import (Vision|CoreImage|CoreML|Metal|Accelerate|MetalKit|VideoToolbox)' Sources/ ; then
            echo "::error::Forbidden image-processing framework imported under Sources/"
            exit 1
          fi

  ui-snapshot:
    name: UI screenshots
    runs-on: macos-26
    timeout-minutes: 12
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          # make app builds + embeds the pinned helper from this submodule and
          # asserts its --version, so the submodule must be present.
          submodules: recursive
      - name: Build app bundle
        run: make app
      - name: Capture screenshots
        run: make screenshots
      - name: Upload screenshots artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots-${{ github.sha }}
          path: build/screenshots/
          if-no-files-found: warn
